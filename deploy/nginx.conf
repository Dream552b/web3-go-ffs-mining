server {
    listen 80;
    server_name web3-test.dreambinjk.top;

    # 访问日志
    access_log /var/log/nginx/fss-mining-access.log;
    error_log  /var/log/nginx/fss-mining-error.log;

    # 请求体大小限制
    client_max_body_size 10m;

    # 反向代理到 Go 服务
    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
    }

    # Swagger UI 单独配置（与上面 / 合并，此处仅作说明）
    # 访问地址：http://web3-test.dreambinjk.top/swagger/index.html
}
